name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"        # match the go.mod directive (go 1.22.10)
          cache: true
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
