# credential-gateway example config
# Install to ~/.config/credential-gateway/config.yaml with mode 0600
# or /etc/credential-gateway/config.yaml (root-owned, mode 0600)
#
# `listen` accepts ANY address, not just 127.0.0.1. Loopback is the default
# shown below; to serve other machines on a trusted network, bind an interface
# address instead, e.g. listen: "100.111.44.50:8080" (a Tailscale IP). The
# proxies do no inbound auth, so the network you bind to is the trust boundary
# — bind only to a network you trust, never a public address without an auth
# layer in front. See "Network trust boundary" in the README.

http:
  - name: openai
    listen: "127.0.0.1:8080"
    upstream: "https://api.openai.com"
    headers:
      Authorization: "Bearer sk-REPLACE_ME"

# MySQL proxy — the upstream account MUST authenticate with mysql_native_password.
# A stock MySQL 8.0+ account defaults to caching_sha2_password, which this proxy
# does not support; connecting to one returns a clean auth error naming the plugin.
# Convert the account with:
#   ALTER USER '<user>'@'%' IDENTIFIED WITH mysql_native_password BY '<password>';
mysql:
  - listen: "127.0.0.1:3307"
    upstream: "real-db-host:3306"
    user: dbuser
    password: "REPLACE_ME"
    database: mydb

redis:
  - listen: "127.0.0.1:6380"
    upstream: "real-redis-host:6379"
    password: "REPLACE_ME"

postgres:
  - listen: "127.0.0.1:5433"
    upstream: "real-pg-host:5432"
    user: dbuser
    password: "REPLACE_ME"
    database: mydb   # optional; falls through to client's requested database if omitted

# Oracle proxy — EXPERIMENTAL: does not authenticate against real Oracle servers
# (auth token is SHA1(password+salt), not real Oracle O5LGP). Not for production.
